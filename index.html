<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE FAMILY ZONE</title>

  <!-- 1. 스타일 엔진: Tailwind CSS Play CDN -->

  <!-- 2. 핵심 엔진: React 18 & ReactDOM 18 -->

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

  <!-- 3. 실시간 코드 번역 기계: 브라우저용 Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 4. 시각 그래픽 효과: Lucide 아이콘 패키지 스크립트 라이브러리 -->
  <script src="https://unpkg.com/lucide-react"></script>
</head>
<body class="bg-[#E4DCC9]">

  <!-- 웹 애플리케이션이 정교하게 그려질 메인 중심 루트 노드 -->
  <div id="root"></div>

  <!-- 브라우저용 실시간 컴파일 연동 스크립트 구동 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    
    // 글로벌 window 컨텍스트에서 Lucide 아이콘 오브젝트들을 안전하게 파싱해 옵니다.
    const { 
      Heart, UserPlus, Edit3, Trash2, ArrowRight, Sparkles, RefreshCw, 
      Plus, X, ChevronLeft, ChevronRight, Upload, Cloud, CloudOff, LogIn, LogOut,
      Smile, Wind, CloudRain, Sun, Snowflake, Pin
    } = LucideReact;

    // 기존 TSX 코드의 이식 에일리어스(Alias) 의존성 안정화 처리
    const CalendarIcon = LucideReact.Calendar;
    const ImageIcon = LucideReact.Image;
    const BookOpen = LucideReact.BookOpen;
    const HomeIcon = LucideReact.Home;

    /* ==========================================================================
       구글 API 글로벌 아키텍처 환경 설정
       ========================================================================== */
    const GOOGLE_CLIENT_ID = "YOUR_CLIENT_ID.apps.googleusercontent.com"; 
    const GOOGLE_API_KEY = "YOUR_API_KEY";                                 
    const DISCOVERY_DOCS = ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"];
    const SCOPES = "https://www.googleapis.com/auth/drive.file"; 

    /* ==========================================================================
       아버님표 문학적 감성 기상예보 스펙트럼 딕셔너리 데이터베이스
       ========================================================================== */
    const MOOD_SPECTRA = {
      CALM: {
        icon: '🌿', title: '고요', color: '#486B56',
        levels: {
          low: { label: '덤덤함 · 잔잔함', desc: '나는 지금 바람 없는 아침 들판을 걷고 있어요.' },
          mid: { label: '편안함 · 안도', desc: '나는 지금 햇살이 천천히 내려앉는 오후에 앉아 있어요.' },
          high: { label: '고요함 · 유유자적', desc: '나는 지금 고요한 호수의 저녁에 머물러 있어요.' }
        }
      },
      FLUTTER: {
        icon: '🌸', title: '두근거림', color: '#A54042',
        levels: {
          low: { label: '은은한 설렘', desc: '나는 지금 꽃잎 하나가 스쳐가는 봄바람을 느끼고 있어요.' },
          mid: { label: '설렘 · 정겨움', desc: '나는 지금 따뜻한 봄날, 누군가와 나란히 걷고 있어요.' },
          high: { label: '감동 · 충만함', desc: '나는 지금 노을이 가슴까지 물드는 저녁을 바라보고 있어요.' }
        }
      },
      VITALITY: {
        icon: '☀️', title: '생기', color: '#B2873B',
        levels: {
          low: { label: '기운 남', desc: '나는 지금 아침 햇살이 창문을 두드리는 소리에 깨어나고 있어요.' },
          mid: { label: '신남 · 활기', desc: '나는 지금 바람을 가르며 여름 들판을 달리고 있어요.' },
          high: { label: '환희 · 보람', desc: '나는 지금 눈부신 태양 아래서 수확한 열매를 품에 안고 있어요.' }
        }
      },
      ANXIETY: {
        icon: '☁️', title: '걱정', color: '#6A7D8F',
        levels: {
          low: { label: '신경 쓰임', desc: '나는 지금 구름이 조금씩 모여드는 하늘을 올려다보고 있어요.' },
          mid: { label: '초조함', desc: '나는 지금 비가 내리기 직전의 거리를 서성이고 있어요.' },
          high: { label: '공포 · 압박', desc: '나는 지금 폭풍 전야의 바닷가에 홀로 서 있어요.' }
        }
      },
      ANGER: {
        icon: '⛈️', title: '화남', color: '#8C4F2B',
        levels: {
          low: { label: '속상함', desc: '나는 지금 후텁지근한 공기 속에서 이마의 땀을 훔치고 있어요.' },
          mid: { label: '화남', desc: '나는 지금 천둥소리가 점점 가까워지는 하늘 아래 서 있어요.' },
          high: { label: '분노 폭발', desc: '나는 지금 번개가 하늘을 가르는 폭풍 한가운데에 있어요.' }
        }
      },
      SADNESS: {
        icon: '🌧️', title: '그리움', color: '#526A7A',
        levels: {
          low: { label: '서운함', desc: '나는 지금 창문을 적시는 가을비를 바라보고 있어요.' },
          mid: { label: '슬픔', desc: '나는 지금 하루 종일 비가 내리는 거리를 천천히 걷고 있어요.' },
          high: { label: '절망', desc: '나는 지금 폭우가 내리는 깊은 밤을 지나고 있어요.' }
        }
      },
      LETHARGY: {
        icon: '❄️', title: '소진', color: '#24221F',
        levels: {
          low: { label: '지루함', desc: '나는 지금 해가 잘 들지 않는 겨울 오후에 앉아 있어요.' },
          mid: { label: '허탈함', desc: '나는 지금 해가 일찍 저무는 겨울 저녁을 바라보고 있어요.' },
          high: { label: '번아웃', desc: '나는 지금 눈도 오지 않는 겨울 벌판에 멈춰 서 있어요.' }
        }
      }
    };

    function App() {
      // --- 1. CLOUD STORAGE STATES ---
      const [gapiInited, setGapiInited] = useState(false);
      const [gisInited, setGisInited] = useState(false);
      const [isCloudConnected, setIsCloudConnected] = useState(false);
      const [appFolderId, setAppFolderId] = useState(null);
      const [dbFileId, setDbFileId] = useState(null);
      const [isSyncing, setIsSyncing] = useState(false);

      // --- 2. APPLICATION CORE STATES ---
      const [familyMembers, setFamilyMembers] = useState([
        { id: '1', name: '할머니', emoji: '👵', color: '#A54042', role: '세심한 관찰자' },
        { id: '2', name: '아빠', emoji: '👨', color: '#B2873B', role: '호기심 낚시꾼' },
        { id: '3', name: '엄마', emoji: '👩', color: '#486B56', role: '다정한 요리사' },
        { id: '4', name: '나', emoji: '🧒', color: '#24221F', role: '오늘의 기록관' },
      ]);

      const [activeTab, setActiveTab] = useState('home');
      const [toastMessage, setToastMessage] = useState('');
      const [newsList, setNewsList] = useState([]);
      const [moodForecast, setMoodForecast] = useState({});
      const [stickyNotes, setStickyNotes] = useState([]);
      const [currentDate, setCurrentDate] = useState(new Date(2026, 5, 11)); 
      const [calendarEvents, setCalendarEvents] = useState([]);
      const [memories, setMemories] = useState([]);
      const [letters, setLetters] = useState([]);

      // UI 입력 제어 프레임 인터페이스 상태들
      const [isDossierModalOpen, setIsDossierModalOpen] = useState(false);
      const [editingMember, setEditingMember] = useState(null);
      const [newMemberName, setNewMemberName] = useState('');
      const [newMemberEmoji, setNewMemberEmoji] = useState('🧑');
      const [newMemberColor, setNewMemberColor] = useState('#A54042');
      const [newMemberRole, setNewMemberRole] = useState('');

      const [isAddingNews, setIsAddingNews] = useState(false);
      const [newNewsTitle, setNewNewsTitle] = useState('');
      const [newNewsContent, setNewNewsContent] = useState('');
      const [newNewsAuthor, setNewNewsAuthor] = useState('4');
      const [selectedImageFile, setSelectedImageFile] = useState(null);
      const [imagePreview, setImagePreview] = useState('');

      const [selectedMoodMember, setSelectedMoodMember] = useState('4');
      const [editingMoodCategory, setEditingMoodCategory] = useState('CALM');
      const [editingMoodLevel, setEditingMoodLevel] = useState('mid');
      const [editingMoodComment, setEditingMoodComment] = useState(''); 

      const [newStickyContent, setNewStickyContent] = useState('');
      const [newStickyAuthor, setNewStickyAuthor] = useState('4');

      const [isAddingEvent, setIsAddingEvent] = useState(false);
      const [newEventTitle, setNewEventTitle] = useState('');
      const [newEventDate, setNewEventDate] = useState('2026-06-11');
      const [newEventMember, setNewEventMember] = useState('3');

      const [shuffling, setShuffling] = useState(false);
      const [dialRotation, setDialRotation] = useState(0);
      const [highlightedMemory, setHighlightedMemory] = useState(null);

      const [selectedLetter, setSelectedLetter] = useState(null);
      const [isWritingLetter, setIsWritingLetter] = useState(false);
      const [newLetterTitle, setNewLetterTitle] = useState('');
      const [newLetterContent, setNewLetterContent] = useState('');
      const [newLetterSender, setNewLetterSender] = useState('4');
      const [newLetterReceiver, setNewLetterReceiver] = useState('1');

      const tokenClientRef = useRef(null);

      // 모듈 동적 로드 감지 및 Fallback 안전장치 가동
      useEffect(() => {
        const loadScripts = () => {
          const gapiScript = document.createElement('script');
          gapiScript.src = "https://apis.google.com/js/api.js";
          gapiScript.async = true; gapiScript.defer = true;
          gapiScript.onload = initGapi;
          document.body.appendChild(gapiScript);

          const gisScript = document.createElement('script');
          gisScript.src = "https://accounts.google.com/gsi/client";
          gisScript.async = true; gisScript.defer = true;
          gisScript.onload = initGis;
          document.body.appendChild(gisScript);
        };

        if (GOOGLE_CLIENT_ID && GOOGLE_CLIENT_ID !== "YOUR_CLIENT_ID.apps.googleusercontent.com") {
          loadScripts();
        } else {
          loadLocalFallback();
        }
      }, []);

      const initGapi = () => {
        window.gapi.load('client', async () => {
          try {
            await window.gapi.client.init({ apiKey: GOOGLE_API_KEY, discoveryDocs: DISCOVERY_DOCS });
            setGapiInited(true);
          } catch (err) {
            console.error("GAPI 초기화 실패:", err);
          }
        });
      };

      const initGis = () => {
        try {
          tokenClientRef.current = window.google.accounts.oauth2.initTokenClient({
            client_id: GOOGLE_CLIENT_ID, scope: SCOPES,
            callback: async (resp) => {
              if (resp.error) return;
              setIsCloudConnected(true);
              showToast("구글 클라우드와 연결되었습니다.");
              await setupDriveArchitecture();
            },
          });
          setGisInited(true);
        } catch (err) {
          console.error("GIS 초기화 실패:", err);
        }
      };

      const setupDriveArchitecture = async () => {
        setIsSyncing(true);
        try {
          let response = await window.gapi.client.drive.files.list({
            q: "mimeType='application/vnd.google-apps.folder' and name='THE FAMILY ZONE ARCHIVE' and trashed=false",
            fields: 'files(id, name)'
          });
          let folders = response.result.files;
          let folderId = '';

          if (folders.length > 0) {
            folderId = folders[0].id;
          } else {
            const folderResponse = await window.gapi.client.drive.files.create({
              resource: { name: 'THE FAMILY ZONE ARCHIVE', mimeType: 'application/vnd.google-apps.folder' },
              fields: 'id'
            });
            folderId = folderResponse.result.id;
          }
          setAppFolderId(folderId);

          response = await window.gapi.client.drive.files.list({
            q: `name='diary_data.json' and '${folderId}' in parents and trashed=false`,
            fields: 'files(id, name)'
          });
          let files = response.result.files;

          if (files.length > 0) {
            setDbFileId(files[0].id);
            await downloadDataFromCloud(files[0].id);
          } else {
            await createAndUploadInitialDB(folderId);
          }
        } catch (err) {
          console.error(err);
          showToast("드라이브 구조 생성 중 오류가 발생했습니다.");
        } finally {
          setIsSyncing(false);
        }
      };

      const downloadDataFromCloud = async (fileId) => {
        try {
          const resp = await window.gapi.client.drive.files.get({ fileId: fileId, alt: 'media' });
          const data = resp.result;
          if (data) {
            if (data.familyMembers) setFamilyMembers(data.familyMembers);
            if (data.newsList) setNewsList(data.newsList);
            if (data.moodForecast) setMoodForecast(data.moodForecast);
            if (data.stickyNotes) setStickyNotes(data.stickyNotes);
            if (data.calendarEvents) setCalendarEvents(data.calendarEvents);
            if (data.memories) setMemories(data.memories);
            if (data.letters) setLetters(data.letters);
          }
          showToast("구글 드라이브에서 최신 수첩을 동기화했습니다.");
        } catch (err) { console.error(err); }
      };

      const syncDataToCloud = async (currentFolderId = appFolderId, currentDbId = dbFileId, updatedState = null) => {
        if (!isCloudConnected || !currentFolderId || !currentDbId) return;
        setIsSyncing(true);
        const fullPayload = updatedState ? updatedState : { familyMembers, newsList, moodForecast, stickyNotes, calendarEvents, memories, letters };
        try {
          await window.gapi.client.request({
            path: `/upload/drive/v3/files/${currentDbId}`, method: 'PATCH',
            params: { uploadType: 'media' }, body: JSON.stringify(fullPayload)
          });
        } catch (err) { console.error("클라우드 동기화 실패:", err); }
        finally { setIsSyncing(false); }
      };

      const createAndUploadInitialDB = async (folderId) => {
        const initialPayload = {
          familyMembers,
          newsList: [
            { id: 'n1', authorId: '1', title: '앞뜰 화단의 들국화가 보름 일찍 피었단다', content: '아침 이슬을 털러 나갔더니 노란 들국화 한 송이가 수줍게 목을 밀어 올렸더구나. 바쁜 세상 속에서도 기어이 제 철을 기억하고 피어나는 생명이 참 기특하지 않니.', date: '2026-06-11', imageUrl: '', reactions: { '❤️': 3, '👍': 2, '☕': 4 } }
          ],
          moodForecast: { '1': { category: 'CALM', level: 'mid', comment: '고요한 기분' } },
          stickyNotes: [{ id: 's1', authorId: '3', content: '냉장고에 매실액 타두었으니 시원하게 한 잔씩들 하거라!', color: '#F7F4EB', angle: -1.2 }],
          calendarEvents: [{ id: 'e1', title: '엄마 생신 축하 잔치 💐', date: '2026-06-15', memberId: '3' }],
          memories: [{ id: 'm1', title: '가장 따뜻했던 가을 산책길', desc: '온 식구가 단풍 낙엽길을 밟으며 깔깔대던 가을 오후.', date: '2025-10-15', imageUrl: '' }],
          letters: [{ id: 'l1', senderId: '3', receiverId: '4', title: '사랑하는 우리 막내에게', content: '밥은 거르지 말고 마음 한구석도 외롭게 두지 말거라.', date: '2026-06-08', isNew: true }]
        };

        try {
          const response = await window.gapi.client.drive.files.create({
            resource: { name: 'diary_data.json', mimeType: 'application/json', parents: [folderId] }, fields: 'id'
          });
          const newFileId = response.result.id;
          setDbFileId(newFileId);

          await window.gapi.client.request({
            path: `/upload/drive/v3/files/${newFileId}`, method: 'PATCH',
            params: { uploadType: 'media' }, body: JSON.stringify(initialPayload)
          });

          setNewsList(initialPayload.newsList);
          setMoodForecast(initialPayload.moodForecast);
          setStickyNotes(initialPayload.stickyNotes);
          setCalendarEvents(initialPayload.calendarEvents);
          setMemories(initialPayload.memories);
          setLetters(initialPayload.letters);
          showToast("구글 드라이브 마스터 다이어리가 개정되었습니다.");
        } catch (err) { console.error(err); }
      };

      const uploadImageToDrive = async (file) => {
        if (!isCloudConnected || !appFolderId) return "";
        try {
          const metadata = { name: `photo_${Date.now()}_${file.name}`, parents: [appFolderId] };
          const base64Data = await new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.readAsDataURL(file);
          });
          const boundary = 'foo_bar_baz';
          const delimiter = `\r\n--${boundary}\r\n`;
          const close_delimiter = `\r\n--${boundary}--`;
          const multipartRequestBody =
            delimiter + 'Content-Type: application/json; charset=UTF-8\r\n\r\n' + JSON.stringify(metadata) +
            delimiter + 'Content-Transfer-Encoding: base64\r\n' + `Content-Type: ${file.type}\r\n\r\n` + base64Data + close_delimiter;

          const response = await window.gapi.client.request({
            path: '/upload/drive/v3/files', method: 'POST',
            params: { uploadType: 'multipart' }, headers: { 'Content-Type': `multipart/related; boundary=${boundary}` },
            body: multipartRequestBody
          });
          return `https://lh3.googleusercontent.com/d/${response.result.id}=w400`;
        } catch (err) { console.error(err); return ""; }
      };

      const loadLocalFallback = () => {
        const local = localStorage.getItem('THE_FAMILY_ZONE_LOCAL_V2');
        if (local) {
          const data = JSON.parse(local);
          if (data.familyMembers) setFamilyMembers(data.familyMembers);
          if (data.newsList) setNewsList(data.newsList);
          if (data.moodForecast) setMoodForecast(data.moodForecast);
          if (data.stickyNotes) setStickyNotes(data.stickyNotes);
          if (data.calendarEvents) setCalendarEvents(data.calendarEvents);
          if (data.memories) setMemories(data.memories);
          if (data.letters) setLetters(data.letters);
        } else {
          setNewsList([
            { id: 'n1', authorId: '1', title: '앞뜰 화단의 들국화가 보름 일찍 피었단다', content: '아침 이슬을 털러 나갔더니 노란 들국화 한 송이가 수줍게 목을 밀어 올렸더구나. 바쁜 세상 속에서도 기어이 제 철을 기억하고 피어나는 생명이 참 기특하지 않니. 퇴근길 모두 꼭 눈인사 나누렴.', date: '2026-06-11', imageUrl: '', reactions: { '❤️': 3, '👍': 2, '☕': 4 } },
            { id: 'n2', authorId: '2', title: '서랍 깊은 곳에서 아빠의 소중한 연필깎이를 찾았다', content: '초등학교 시절 할아버지가 사주셨던 묵직한 무쇠 기차 모양 연필깎이란다. 녹이 슬었을까 조심스레 연필 한 자루를 깎아보니, 서걱서걱 우아한 소리와 함께 새것처럼 날카롭게 깎여 나오는구나.', date: '2026-06-10', imageUrl: '', reactions: { '❤️': 2, '🎉': 4, '👍': 1 } }
          ]);
          setMoodForecast({
            '1': { category: 'CALM', level: 'mid', comment: '조용히 숨 고르는 중' },
            '2': { category: 'CALM', level: 'low', comment: '바람 없는 아침 들판을 걷고 있어요.' },
            '3': { category: 'VITALITY', level: 'high', comment: '생기 충만한 기분 좋은 오동나무 아침' },
            '4': { category: 'FLUTTER', level: 'mid', comment: '설레는 발걸음으로 하루를 엽니다.' }
          });
          setStickyNotes([

                <div className="space-y-6">
                  {/* 마음 예보판 */}
                  <div className="bg-[#E4DCC9]/45 rounded-xl p-4 sm:p-6 border border-dashed border-[#24221F]/80">
                    <h2 className="text-base font-bold mb-4 flex items-center gap-1">🌦️ 가족 마음 풍경 기상 예보</h2>
                    <div className="space-y-3 mb-4">
                      {familyMembers.map(member => {
                        const mood = moodForecast[member.id] || { category: 'CALM', level: 'mid', comment: '고요한 기분' };
                        const moodData = MOOD_SPECTRA[mood.category] || MOOD_SPECTRA.CALM;
                        const levelData = moodData.levels[mood.level] || moodData.levels.mid;
                        return (
                          <div key={member.id} className="bg-[#F7F4EB] border border-[#24221F] rounded-xl p-3 shadow-sm">
                            <div className="flex items-center justify-between border-b border-dashed border-[#24221F]/20 pb-1">
                              <span className="font-bold text-xs">{member.emoji} {member.name}</span>
                              <span className="text-[9px] font-bold px-2 py-0.5 rounded-full text-white" style={{ backgroundColor: moodData.color }}>{moodData.icon} {moodData.title}</span>
                            </div>
                            <p className="text-[11px] font-medium text-[#24221F]/90 my-1 italic">"{levelData.desc}"</p>
                            {mood.comment && <div className="text-[10px] text-[#24221F]/70 pl-1">↳ "{mood.comment}"</div>}
                          </div>
                        );
                      })}
                    </div>

                    <form onSubmit={handleUpdateMood} className="bg-[#F7F4EB] p-3 rounded-xl border border-[#24221F] space-y-2 text-xs">
                      <div className="grid grid-cols-2 gap-2">
                        <div>
                          <select value={selectedMoodMember} onChange={(e) => setSelectedMoodMember(e.target.value)} className="w-full bg-[#E4DCC9] border border-[#24221F] p-1 rounded-md text-xs">
                            {familyMembers.map(m => <option key={m.id} value={m.id}>{m.emoji} {m.name}</option>)}
                          </select>
                        </div>
                        <div>
                          <select value={editingMoodLevel} onChange={(e) => setEditingMoodLevel(e.target.value)} className="w-full bg-[#E4DCC9] border border-[#24221F] p-1 rounded-md text-xs">
                            <option value="low">낮음</option><option value="mid">중간</option><option value="high">높음</option>
                          </select>
                        </div>
                      </div>
                      <div className="grid grid-cols-4 gap-1">
                        {Object.keys(MOOD_SPECTRA).map(key => (
                          <button key={key} type="button" onClick={() => setEditingMoodCategory(key)} className={`p-1 rounded border text-[10px] text-center ${editingMoodCategory === key ? 'bg-[#24221F] text-white' : 'bg-[#E4DCC9]/30'}`}>
                            <div>{MOOD_SPECTRA[key].icon}</div>
                            <div className="text-[8px] scale-90 truncate">{MOOD_SPECTRA[key].title}</div>
                          </button>
                        ))}
                      </div>
                      <input type="text" placeholder="속삭임 한줄 기입" value={editingMoodComment} onChange={(e) => setEditingMoodComment(e.target.value)} className="w-full bg-[#E4DCC9]/40 border border-[#24221F] p-1.5 rounded text-xs" />
                      <button type="submit" className="w-full bg-[#24221F] text-white py-1.5 rounded font-bold">발행하기 ✦</button>
                    </form>
                  </div>

                  {/* 포스트잇 메모판 */}
                  <div className="bg-[#E4DCC9]/45 rounded-xl p-4 sm:p-6 border border-dashed border-[#24221F]/80">
                    <h2 className="text-base font-bold mb-3">📌 포스트잇 메모판</h2>
                    <form onSubmit={handleAddSticky} className="mb-3 flex gap-1.5">
                      <input type="text" placeholder="안부 남기기..." value={newStickyContent} onChange={(e) => setNewStickyContent(e.target.value)} className="flex-1 bg-[#F7F4EB] border border-[#24221F] rounded-lg p-2 text-xs" />
                      <button type="submit" className="bg-[#24221F] text-white p-2 rounded-lg hover:bg-[#A54042]"><Pin className="w-4 h-4 -rotate-45" /></button>
                    </form>
                    <div className="space-y-2">
                      {stickyNotes.map(note => (
                        <div key={note.id} className="p-2.5 rounded-xl border border-[#24221F] shadow-sm text-xs relative" style={{ backgroundColor: note.color, transform: `rotate(${note.angle}deg)` }}>
                          <div className="flex justify-between items-center opacity-65 text-[10px] mb-0.5">
                            <span>{getMember(note.authorId).emoji} {getMember(note.authorId).name}</span>
                            <button onClick={() => handleDeleteSticky(note.id)}><X className="w-3 h-3 text-red-700" /></button>
                          </div>
                          <p className="font-sans font-medium">{note.content}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* TAB 2: 시간의 나무 달력 판넬 */}
            {activeTab === 'calendar' && (
              <div className="bg-[#E4DCC9]/45 rounded-xl p-4 sm:p-6 border border-dashed border-[#24221F]/80 grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="lg:col-span-2 bg-[#F7F4EB] border-2 border-[#24221F] rounded-2xl p-4 shadow">
                  <div className="flex items-center justify-between border-b-2 border-[#24221F] pb-2 mb-4">
                    <h2 className="font-bold font-sans">2026년 {currentDate.getMonth() + 1}월 시간의 나무</h2>
                    <div className="flex gap-1">
                      <button onClick={handlePrevMonth} className="p-1 border border-[#24221F] rounded"><ChevronLeft className="w-4 h-4" /></button>
                      <button onClick={handleNextMonth} className="p-1 border border-[#24221F] rounded"><ChevronRight className="w-4 h-4" /></button>
                    </div>
                  </div>
                  <div className="grid grid-cols-7 gap-1 text-center font-bold text-xs border-b pb-2 mb-2 font-sans">
                    {['일','월','화','수','목','금','토'].map(d => <span key={d}>{d}</span>)}
                  </div>
                  <div className="grid grid-cols-7 gap-1 text-xs min-h-[220px]">
                    <div className="border border-transparent"></div>
                    {Array.from({ length: 30 }, (_, i) => {
                      const dNum = i + 1;
                      const dStr = `2026-06-${dNum < 10 ? '0' + dNum : dNum}`;
                      const evts = calendarEvents.filter(e => e.date === dStr);
                      return (
                        <div key={dNum} className="border border-[#24221F]/15 rounded p-1 flex flex-col justify-between items-start bg-[#F7F4EB] min-h-[45px]">
                          <span className="font-bold text-[10px] opacity-75 font-sans">{dNum}</span>
                          <div className="w-full space-y-0.5">
                            {evts.map(e => (
                              <div key={e.id} className="text-[8px] text-white px-0.5 rounded truncate font-sans" style={{ backgroundColor: getMember(e.memberId).color }} title={e.title}>
                                {e.title}
                              </div>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div className="space-y-4">
                  <div className="bg-[#F7F4EB] border border-[#24221F] p-4 rounded-xl shadow-sm text-xs">
                    <h3 className="font-bold text-[#A54042] mb-2 font-sans">🌳 새 일정 나무 조율</h3>
                    <form onSubmit={handleAddCalendarEvent} className="space-y-2">
                      <input type="text" placeholder="경조사 명칭 기입" value={newEventTitle} onChange={(e) => setNewEventTitle(e.target.value)} className="w-full bg-[#E4DCC9]/40 border border-[#24221F] p-2 rounded-lg" />
                      <input type="date" value={newEventDate} onChange={(e) => setNewEventDate(e.target.value)} className="w-full bg-[#E4DCC9]/40 border border-[#24221F] p-2 rounded-lg font-sans" />
                      <button type="submit" className="w-full bg-[#24221F] text-white py-2 rounded-lg font-bold">시간의 나무에 기록</button>
                    </form>
                  </div>
                  <div className="bg-[#F7F4EB] border border-[#24221F] p-4 rounded-xl shadow-sm text-xs space-y-2">
                    <h3 className="font-bold opacity-80 font-sans">다가오는 가족 연혁</h3>
                    {calendarEvents.map(e => (
                      <div key={e.id} className="flex justify-between items-center bg-[#E4DCC9]/45 p-2 rounded-lg text-xs border border-[#24221F]/10 font-sans">
                        <div>
                          <div className="font-bold">{e.title}</div>
                          <div className="text-[10px] opacity-60">{e.date}</div>
                        </div>
                        <span className="bg-[#A54042] text-white px-1.5 py-0.5 rounded text-[9px] font-bold shrink-0">{getDDay(e.date)}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* TAB 3: 추억 산책로 판넬 */}
            {activeTab === 'memory' && (
              <div className="space-y-6">
                <div className="bg-[#E4DCC9]/45 rounded-xl p-4 sm:p-6 border border-dashed border-[#24221F]/80 grid grid-cols-1 md:grid-cols-2 gap-6 items-center">
                  <div className="text-center p-4 bg-[#F7F4EB] border border-[#24221F] rounded-xl flex flex-col items-center shadow-sm">
                    <h3 className="text-xs font-bold text-[#A54042] mb-3 font-vintage-title">✦ DIAL RECOLLECTION ✦</h3>
                    <div className="w-28 h-28 border-2 border-double border-[#24221F] rounded-full bg-[#E4DCC9] flex items-center justify-center transition-transform duration-1000 relative" style={{ transform: `rotate(${dialRotation}deg)` }}>
                      <button onClick={handleShuffleDial} disabled={shuffling} className="absolute w-14 h-14 bg-[#A54042] text-white font-bold rounded-full border border-[#24221F] text-xs flex items-center justify-center shadow">
                        <RefreshCw className="w-4 h-4" />
                      </button>
                    </div>
                  </div>
                  <div>
                    {highlightedMemory ? (
                      <div className="bg-[#24221F] text-[#E4DCC9] p-4 rounded-xl shadow text-xs">
                        <span className="text-[#B2873B] block text-[10px] mb-1 font-sans">{highlightedMemory.date} 기록</span>
                        <h4 className="font-bold text-white mb-1 font-serif text-sm">{highlightedMemory.title}</h4>
                        <p className="opacity-80 leading-relaxed text-justify">{highlightedMemory.desc}</p>
                      </div>
                    ) : (
                      <div className="h-28 border border-dashed border-[#24221F]/40 rounded-xl flex items-center justify-center text-xs opacity-60 text-center px-4 leading-relaxed">
                        추억 산책로의 다이얼 허브를 돌려보세요.<br/>서랍 내부의 수필 기록이 정렬됩니다.
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* TAB 4: 마음 우체국 */}
            {activeTab === 'note' && (
              <div className="bg-[#E4DCC9]/45 rounded-xl p-4 sm:p-6 border border-dashed border-[#24221F]/80 space-y-6">
                <div className="flex justify-between items-center border-b-2 border-[#24221F] pb-3">
                  <h2 className="text-base sm:text-lg font-bold flex items-center gap-1"><span>💌</span> 마음 우체국 밀봉 편지함</h2>
                  <button onClick={() => setIsWritingLetter(!isWritingLetter)} className="bg-[#24221F] text-white text-xs px-4 py-2 rounded-xl shadow font-sans font-bold">새 편지 쓰기</button>
                </div>

                {isWritingLetter && (
                  <form onSubmit={handleAddLetter} className="bg-[#F7F4EB] border border-[#24221F] p-4 rounded-xl max-w-xl mx-auto space-y-3 text-xs shadow-md">
                    <div className="grid grid-cols-2 gap-2">
                      <select value={newLetterSender} onChange={(e) => setNewLetterSender(e.target.value)} className="bg-[#E4DCC9] border border-[#24221F] p-1.5 rounded-lg">
                        {familyMembers.map(m => <option key={m.id} value={m.id}>발신: {m.name}</option>)}
                      </select>
                      <select value={newLetterReceiver} onChange={(e) => setNewLetterReceiver(e.target.value)} className="bg-[#E4DCC9] border border-[#24221F] p-1.5 rounded-lg">
                        {familyMembers.map(m => <option key={m.id} value={m.id}>수신: {m.name}</option>)}
                      </select>
                    </div>
                    <input type="text" placeholder="편지 표제" value={newLetterTitle} onChange={(e) => setNewLetterTitle(e.target.value)} className="w-full bg-[#E4DCC9]/40 border border-[#24221F] p-2 rounded-lg" />
                    <textarea rows="4" placeholder="꾹꾹 눌러 쓸 소중한 사서함 이야기" value={newLetterContent} onChange={(e) => setNewLetterContent(e.target.value)} className="w-full bg-[#E4DCC9]/40 border border-[#24221F] p-2 rounded-lg" />
                    <button type="submit" className="w-full bg-[#24221F] text-white py-2 rounded-lg font-bold">우체통 전송</button>
                  </form>
                )}

                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {letters.map(letter => (
                    <div key={letter.id} onClick={() => setSelectedLetter(letter)} className="bg-[#F7F4EB] border border-[#24221F] p-4 rounded-xl shadow-[3px_3px_0px_#24221F] cursor-pointer hover:bg-[#FDF6E2] transition-colors">
                      <div className="text-[10px] opacity-60 font-sans mb-0.5">From. {getMember(letter.senderId).name} ➔ To. {getMember(letter.receiverId).name}</div>
                      <h3 className="font-bold text-sm font-serif text-[#24221F] truncate">{letter.title}</h3>
                      <p className="text-xs opacity-75 line-clamp-2 mt-1 leading-relaxed">{letter.content}</p>
                    </div>
                  ))}
                </div>

                {selectedLetter && (
                  <div className="fixed inset-0 bg-[#24221F]/75 z-50 flex items-center justify-center p-4 backdrop-blur-sm" onClick={() => setSelectedLetter(null)}>
                    <div className="bg-[#F7F4EB] border-2 border-[#24221F] p-5 rounded-[20px] max-w-md w-full relative shadow-lg" onClick={e => e.stopPropagation()}>
                      <button onClick={() => setSelectedLetter(null)} className="absolute top-4 right-4 border border-[#24221F]/40 rounded-full p-1"><X className="w-3 h-3" /></button>
                      <h2 className="text-base font-bold font-serif border-b pb-2 text-[#24221F] pr-6">{selectedLetter.title}</h2>
                      <div className="text-[10px] opacity-70 my-2 font-sans">날짜: {selectedLetter.date} | 보낸이: {getMember(selectedLetter.senderId).name}</div>
                      <p className="text-xs sm:text-sm bg-[#E4DCC9]/20 p-3 rounded-xl whitespace-pre-line leading-relaxed text-justify">{selectedLetter.content}</p>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* 식구 등록 수정 모달 */}
          {isDossierModalOpen && (
            <div className="fixed inset-0 bg-[#24221F]/75 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
              <div className="bg-[#F7F4EB] border-2 border-[#24221F] p-5 rounded-[20px] max-w-md w-full relative shadow-2xl">
                <button onClick={closeDossierModal} className="absolute top-4 right-4 border border-[#24221F]/50 rounded-full p-1"><X className="w-3.5 h-3.5" /></button>
                <h3 className="text-base font-bold border-b pb-2 mb-3.5 text-center font-serif">가족 수첩 식구 연혁 수정</h3>
                <div className="space-y-1.5 mb-4 max-h-36 overflow-y-auto border-b border-dashed pb-3">
                  {familyMembers.map(m => (
                    <div key={m.id} className="flex justify-between items-center bg-[#E4DCC9]/30 p-2 rounded-lg text-xs border border-[#24221F]/10">
                      <span className="font-bold">{m.emoji} {m.name} <span className="font-normal opacity-60 text-[10px]">({m.role})</span></span>
                      <div className="flex gap-2 text-[10px] font-sans">
                        <button type="button" onClick={() => { setEditingMember(m); setNewMemberName(m.name); setNewMemberRole(m.role); }} className="text-[#B2873B] font-bold">수정</button>
                        <button type="button" onClick={() => handleDeleteMember(m.id, m.name)} className="text-[#A54042] font-bold">삭제</button>
                      </div>
                    </div>
                  ))}
                </div>
                <form onSubmit={handleSaveMember} className="space-y-2 text-xs">
                  <div className="grid grid-cols-2 gap-2">
                    <input type="text" placeholder="식구 성명" value={newMemberName} onChange={(e) => setNewMemberName(e.target.value)} className="w-full bg-[#F7F4EB] border p-1.5 rounded-lg text-xs" />
                    <input type="text" placeholder="식구 역할" value={newMemberRole} onChange={(e) => setNewMemberRole(e.target.value)} className="w-full bg-[#F7F4EB] border p-1.5 rounded-lg text-xs" />
                  </div>
                  <div className="flex justify-between items-center py-1">
                    <span className="text-[10px]">이모지:</span>
                    <input type="text" value={newMemberEmoji} onChange={(e) => setNewMemberEmoji(e.target.value)} className="w-10 bg-[#F7F4EB] text-center border rounded p-1" />
                    <div className="flex gap-1">
                      {['#A54042', '#486B56', '#B2873B', '#24221F'].map(color => (
                        <button key={color} type="button" onClick={() => setNewMemberColor(color)} className={`w-3.5 h-3.5 rounded-full border ${newMemberColor === color ? 'border-black scale-110' : 'border-transparent'}`} style={{ backgroundColor: color }} />
                      ))}
                    </div>
                  </div>
                  <button type="submit" className="w-full bg-[#24221F] text-white py-2 rounded-lg font-bold">프로필 세팅 완료</button>
                </form>
              </div>
            </div>
          )}

          <footer className="mt-6 text-center text-[9px] sm:text-[10px] opacity-60 font-sans">
            <div className="font-vintage-title uppercase">© 2026 THE FAMILY ZONE. INTEGRATED VIA WEB STANDALONE BROWSER ENGINE.</div>
          </footer>
        </div>
      );
    }

    // React 18 루트 인스턴스 초기화 및 메인 렌더링 가동
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
