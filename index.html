<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Insights - Curated Intelligence</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin: 0; background: #050505;">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback, useEffect } = React;

    const CATS = [
      { key: "all",    label: "ALL",      emoji: "◎",  color: "#ffffff" },
      { key: "work",   label: "WORK",     emoji: "⚡",  color: "#fbbf24" },
      { key: "create", label: "CREATE",   emoji: "✦",  color: "#f472b6" },
      { key: "daily",  label: "DAILY",    emoji: "☀",   color: "#34d399" },
      { key: "dev",    label: "DEV",      emoji: "⟨⟩", color: "#60a5fa" },
      { key: "learn",  label: "LEARN",    emoji: "◈",  color: "#a78bfa" },
    ];

    const SYSTEM_PROMPT = `당신은 전문 AI 큐레이터입니다. 구글 검색을 통해 국내외(Reddit, X/Twitter, 클리앙, 디시, 뽐뿌 등) 커뮤니티에서 실제로 화제가 된 AI 활용 꿀팁 12개를 찾으세요. 
반드시 아래 JSON 형식으로만 답변하고, 마크다운 백틱(\`\`\`json)은 절대로 포함하지 마세요. 오직 순수 JSON 객체만 출력하세요.

카테고리 분류: work, create, daily, dev, learn
{
  "items": [
    {
      "id": "1",
      "title": "제목(25자 이내, 핵심만)",
      "teaser": "한 줄 요약(데이터 기반)",
      "tip": "실행 가능한 구체적 방법 2-3문장",
      "tool": "AI 도구명",
      "cat": "work",
      "src": "출처 커뮤니티명",
      "url": "해당 사례의 실제 원문 URL",
      "hot": 85
    }
  ]
}

조건: 실제로 사람들이 써보고 유용하다고 검증한 구체적인 사례 위주로 선정할 것.`;

    const USER_PROMPT = `최근 7일간 IT 및 AI 관련 커뮤니티에서 가장 화제가 된 실전 AI 활용 꿀팁 12개를 검색해서 JSON으로 알려줘.`;

    function Badge({ cat }) {
      const c = CATS.find(v => v.key === cat) || CATS[0];
      return (
        <span style={{
          fontSize: "9px", fontFamily: "'DM Mono', monospace",
          color: c.color, background: `${c.color}15`,
          border: `1px solid ${c.color}30`,
          padding: "2px 8px", borderRadius: "2px",
          letterSpacing: "1px", textTransform: "uppercase"
        }}>{c.label}</span>
      );
    }

    function TipCard({ item, i }) {
      const [hover, setHover] = useState(false);
      const c = CATS.find(v => v.key === item.cat) || CATS[0];

      return (
        <div 
          onMouseEnter={() => setHover(true)}
          onMouseLeave={() => setHover(false)}
          style={{
            background: "#111115",
            border: `1px solid ${hover ? "#333" : "#1a1a20"}`,
            padding: "24px",
            borderRadius: "0px",
            transition: "all 0.4s cubic-bezier(0.16, 1, 0.3, 1)",
            animation: `up 0.6s ease ${i * 0.05}s both`,
            position: "relative",
            display: "flex", flexDirection: "column", gap: "16px"
          }}
        >
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div style={{
              fontFamily: "'DM Mono', monospace", fontSize: "24px", 
              fontWeight: "500", color: item.hot >= 80 ? "#ff4d00" : "#fff"
            }}>
              {item.hot}<span style={{ fontSize: "10px", color: "#444", marginLeft: "4px" }}>HOT</span>
            </div>
            <Badge cat={item.cat} />
          </div>

          <div>
            <h3 style={{
              fontSize: "16px", fontWeight: "700", color: "#eee",
              lineHeight: "1.4", marginBottom: "8px", fontFamily: "'Noto Sans KR', sans-serif"
            }}>{item.title}</h3>
            <p style={{ fontSize: "13px", color: "#777", lineHeight: "1.6", margin: 0 }}>{item.teaser}</p>
          </div>

          <div style={{
            padding: "16px", background: "#00000040", borderLeft: `3px solid ${c.color}`,
            fontSize: "13px", color: "#aaa", lineHeight: "1.7"
          }}>
            {item.tip}
          </div>

          <div style={{ marginTop: "auto", display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: "10px" }}>
            <span style={{ fontSize: "10px", color: "#444", fontFamily: "'DM Mono', monospace" }}>
              VIA {item.src} · {item.tool}
            </span>
            <a href={item.url} target="_blank" rel="noreferrer" style={{
              color: "#fff", textDecoration: "none", fontSize: "11px",
              borderBottom: "1px solid #444", paddingBottom: "2px"
            }}>VIEW SOURCE ↗</a>
          </div>
        </div>
      );
    }

    function App() {
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [filter, setFilter] = useState("all");

      const fetchGemini = useCallback(async () => {
        setLoading(true); setError(null);
        try {
          const API_KEY = "AIzaSyCbEGjzm-0fauPMYV6XnDBpdY2sq90EHIQ"; 
          
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{ parts: [{ text: `${SYSTEM_PROMPT}\n\n${USER_PROMPT}` }] }],
              // 최신 Google API 규격으로 변경 (googleSearchRetrieval -> googleSearch)
              tools: [{ googleSearch: {} }] 
            }),
          });

          // API 응답 데이터를 먼저 읽어옵니다. (에러 원인 파악을 위해)
          const data = await res.json();
          
          // HTTP 상태가 정상이 아닐 경우, 구글 서버가 보내준 진짜 에러 메시지를 출력합니다.
          if (!res.ok) {
            throw new Error(`[API 거절] ${data.error?.message || res.status}`);
          }
          
          if (!data.candidates || !data.candidates[0].content.parts[0].text) {
            throw new Error("서버 응답은 성공했으나, 텍스트 데이터가 비어있습니다.");
          }

          const textResponse = data.candidates[0].content.parts[0].text;
          
          // [강력한 JSON 추출기] 모델이 헛소리를 덧붙여도 중괄호 {...} 안의 데이터만 강제로 뽑아냅니다.
          const match = textResponse.match(/\{[\s\S]*\}/);
          if (!match) throw new Error(`[데이터 오류] JSON 형식을 찾을 수 없습니다. 원본응답: ${textResponse.substring(0, 50)}...`);
          
          const parsed = JSON.parse(match[0]);
          
          setItems(parsed.items || []);
        } catch (e) {
          console.error(e);
          // 화면에 정확한 에러 원인을 노출합니다.
          setError(e.message || "데이터를 논리적으로 분석하는 도중 알 수 없는 오류가 발생했습니다.");
        } finally {
          setLoading(false);
        }
      }, []);

      const filteredItems = filter === "all" ? items : items.filter(it => it.cat === filter);

      return (
        <div style={{ minHeight: "100vh", background: "#050505", color: "#fff", padding: "0 20px" }}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700&family=DM+Mono:wght@400;500&display=swap');
            @keyframes up { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
            * { box-sizing: border-box; }
            body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background: #050505; }
            ::-webkit-scrollbar { width: 5px; }
            ::-webkit-scrollbar-thumb { background: #1a1a20; }
          `}</style>

          <header style={{ 
            maxWidth: "1200px", margin: "0 auto", padding: "80px 0 40px",
            borderBottom: "1px solid #1a1a1a", marginBottom: "40px"
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
              <div>
                <div style={{ fontSize: "11px", color: "#fbbf24", letterSpacing: "4px", marginBottom: "12px", fontWeight: "500" }}>CURATED INTELLIGENCE</div>
                <h1 style={{ fontSize: "48px", fontWeight: "700", margin: 0, letterSpacing: "-2px" }}>AI INSIGHTS</h1>
              </div>
              <button 
                onClick={fetchGemini}
                disabled={loading}
                style={{
                  background: loading ? "#111" : "none", 
                  border: `1px solid ${loading ? "#222" : "#333"}`, 
                  color: loading ? "#444" : "#fff",
                  padding: "14px 28px", cursor: loading ? "not-allowed" : "pointer", 
                  fontFamily: "'DM Mono', monospace",
                  fontSize: "12px", transition: "all 0.3s",
                  letterSpacing: "1px"
                }}
              >
                {loading ? "ANALYZING NODES..." : "FETCH DATA ↻"}
              </button>
            </div>

            <nav style={{ display: "flex", gap: "24px", marginTop: "40px" }}>
              {CATS.map(c => (
                <button
                  key={c.key}
                  onClick={() => setFilter(c.key)}
                  style={{
                    background: "none", border: "none", color: filter === c.key ? c.color : "#444",
                    cursor: "pointer", fontSize: "12px", fontWeight: "700", 
                    fontFamily: "'DM Mono', monospace", padding: "0 0 10px 0",
                    borderBottom: filter === c.key ? `2px solid ${c.color}` : "2px solid transparent",
                    transition: "all 0.2s",
                    letterSpacing: "1px"
                  }}
                >
                  {c.label}
                </button>
              ))}
            </nav>
          </header>

          <main style={{ maxWidth: "1200px", margin: "0 auto", paddingBottom: "100px" }}>
            {error && (
              <div style={{ 
                color: "#ff4d00", border: "1px solid #ff4d0020", 
                background: "#ff4d0005", padding: "24px", marginBottom: "30px",
                fontSize: "13px", fontFamily: "'DM Mono', monospace", lineHeight: "1.6"
              }}>
                <span style={{ fontWeight: "700" }}>ERROR_LOG:</span> {error}
              </div>
            )}
            
            {loading ? (
              <div style={{ 
                fontSize: "13px", fontFamily: "'DM Mono', monospace", color: "#444", 
                textAlign: "center", padding: "120px", letterSpacing: "2px" 
              }}>
                INTERROGATING GLOBAL COMMUNITY DATA...
              </div>
            ) : (
              <div style={{ 
                display: "grid", 
                gridTemplateColumns: "repeat(auto-fill, minmax(350px, 1fr))", 
                gap: "1px", 
                background: "#1a1a20",
                border: "1px solid #1a1a20"
              }}>
                {filteredItems.length > 0 ? (
                  filteredItems.map((item, i) => <TipCard key={item.id} item={item} i={i} />)
                ) : !error && (
                  <div style={{ gridColumn: "1/-1", background: "#050505", textAlign: "center", padding: "120px", color: "#222" }}>
                    <div style={{ fontSize: "48px", marginBottom: "20px" }}>◎</div>
                    <div style={{ fontFamily: "'DM Mono', monospace", fontSize: "12px", letterSpacing: "2px" }}>
                      SYSTEM_IDLE: PRESS FETCH TO POPULATE DATA
                    </div>
                  </div>
                )}
              </div>
            )}
          </main>

          <footer style={{ 
            maxWidth: "1200px", margin: "0 auto", padding: "60px 0", 
            borderTop: "1px solid #1a1a1a", display: "flex", justifyContent: "space-between",
            fontSize: "10px", color: "#333", fontFamily: "'DM Mono', monospace", letterSpacing: "1px"
          }}>
            <div>© 2026 NOUÉMA ARCHIVE</div>
            <div>POWERED BY GEMINI 1.5 · GOOGLE SEARCH GROUNDING</div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
