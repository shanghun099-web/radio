<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 연결 안정화 도구</title>

    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0f172a; color:#f8fafc; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; }
        .container { width:100%; max-width:600px; }
        .card { background:#1e293b; padding:24px; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,.3); }
        h2 { margin-bottom:20px; font-size: 1.25rem; color: #e2e8f0; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 10px; }
        .status { background:#0f172a; border:1px solid #334155; padding:16px; border-radius:10px; min-height:100px; margin-bottom:20px; white-space:pre-wrap; font-size: 0.9rem; color: #cbd5e1; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        button { width:100%; padding:14px; border:none; border-radius:10px; background:#2563eb; color:white; cursor:pointer; font-weight: bold; transition: .2s; }
        button:hover { background:#1d4ed8; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>🚀 Gemini 연결 안정화 도구</h2>
        <div class="input-group">
            <input type="password" id="apiKeyInput" placeholder="API Key를 입력하세요">
        </div>
        <div id="log" class="status">대기 중... API 키를 입력하고 연결을 시작하세요.</div>
        <button id="connectBtn" onclick="safeConnect()">연결 테스트 시작</button>
    </div>
</div>

<script>
const MAX_RETRY = 5;
const REQUEST_TIMEOUT = 15000;

async function safeConnect() {
    const key = document.getElementById("apiKeyInput").value.trim();
    if (!key) { alert("API 키를 입력해주세요."); return; }
    
    const logEl = document.getElementById("log");
    const button = document.getElementById("connectBtn");
    button.disabled = true;

    const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`;

    for (let attempt = 1; attempt <= MAX_RETRY; attempt++) {
        try {
            logEl.className = "status";
            logEl.textContent = `연결 시도 중... (${attempt}/${MAX_RETRY})`;

            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), REQUEST_TIMEOUT);

            const response = await fetch(endpoint, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "M2, 고객예탁금, 투자자 수급 상황에 대해 간략히 분석해줘." }] }]
                }),
                signal: controller.signal
            });

            clearTimeout(id);

            if (!response.ok) throw new Error(`서버 응답 오류 (HTTP ${response.status})`);

            const data = await response.json();
            const result = data?.candidates?.[0]?.content?.parts?.[0]?.text || "성공적으로 응답받았으나 내용을 가져올 수 없습니다.";

            logEl.className = "status success";
            logEl.textContent = `✅ 연결 성공!\n\n${result}`;
            button.disabled = false;
            return;

        } catch (error) {
            if (attempt === MAX_RETRY) {
                logEl.className = "status error";
                logEl.textContent = `❌ 연결 실패\n\n원인: ${error.message}\n(인앱 브라우저라면 크롬/사파리로 다시 열어보세요)`;
            } else {
                await new Promise(r => setTimeout(r, 2000 * attempt));
            }
        }
    }
    button.disabled = false;
}
</script>
</body>
</html>
