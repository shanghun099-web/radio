<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>누에마의 문학 라디오</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#0e0e0e; --surface:#181818; --card:#202020; --border:#2e2e2e;
      --amber:#e8a030; --amber-dim:#7a4f10; --text:#e8e0d4; --text-dim:#7a7268;
      --red:#c0392b; --green:#27ae60;
    }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body { background:var(--bg); color:var(--text); font-family:'Noto Serif KR',serif; min-height:100dvh; display:flex; flex-direction:column; align-items:center; padding:0 0 40px; overflow-x:hidden; }
    body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events:none; z-index:0; }
    .wrap { position:relative; z-index:1; width:100%; max-width:480px; padding:0 20px; }
    header { text-align:center; padding:36px 20px 24px; position:relative; z-index:1; }
    .signal-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--amber); margin-right:8px; vertical-align:middle; animation:pulse 2s ease-in-out infinite; }
    .signal-dot.off { background:var(--text-dim); animation:none; }
    @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(232,160,48,.6)} 50%{opacity:.6;box-shadow:0 0 0 8px rgba(232,160,48,0)} }
    header h1 { font-size:22px; color:var(--amber); letter-spacing:.05em; }
    header p  { font-size:12px; color:var(--text-dim); margin-top:4px; font-family:'DM Mono',monospace; }
    .tabs { display:flex; gap:8px; overflow-x:auto; padding:0 0 4px; scrollbar-width:none; margin-bottom:20px; }
    .tabs::-webkit-scrollbar { display:none; }
    .tab { flex-shrink:0; padding:8px 18px; border-radius:20px; border:1.5px solid var(--border); background:transparent; color:var(--text-dim); font-family:'Noto Serif KR',serif; font-size:13px; cursor:pointer; transition:all .2s; }
    .tab.active { border-color:var(--amber); color:var(--amber); background:rgba(232,160,48,.08); }
    .art-wrap { position:relative; width:100%; aspect-ratio:1; border-radius:16px; overflow:hidden; margin-bottom:24px; background:var(--card); border:1px solid var(--border); }
    .art-bg { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
    .art-icon { font-size:80px; opacity:0.12; user-select:none; }
    .art-gradient { position:absolute; inset:0; background:radial-gradient(ellipse at 30% 40%,rgba(232,160,48,.15) 0%,transparent 70%); }
    #yt-player { position:absolute; width:1px; height:1px; opacity:0; pointer-events:none; }
    .visualizer { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); display:flex; align-items:flex-end; gap:4px; height:40px; }
    .vbar { width:4px; border-radius:2px; background:var(--amber); opacity:0.7; animation:vbar-bounce var(--dur,1s) ease-in-out infinite alternate; transform-origin:bottom; }
    @keyframes vbar-bounce { from{height:4px} to{height:var(--h,30px)} }
    .visualizer.paused .vbar { animation-play-state:paused; }
    .status-badge { position:absolute; top:14px; right:14px; font-family:'DM Mono',monospace; font-size:11px; padding:4px 10px; border-radius:20px; background:rgba(14,14,14,.8); border:1px solid var(--border); color:var(--text-dim); backdrop-filter:blur(4px); }
    .status-badge.playing { color:var(--amber); border-color:var(--amber-dim); }
    .status-badge.error   { color:var(--red);   border-color:var(--red); }
    .track-counter { position:absolute; top:14px; left:14px; font-family:'DM Mono',monospace; font-size:11px; color:var(--text-dim); }
    .track-info { text-align:center; margin-bottom:20px; }
    .track-title { font-size:18px; font-weight:700; color:var(--text); line-height:1.4; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .track-meta  { font-size:12px; color:var(--text-dim); font-family:'DM Mono',monospace; }
    .volume-row  { display:flex; align-items:center; gap:12px; margin-bottom:28px; }
    .volume-icon { font-size:16px; color:var(--text-dim); flex-shrink:0; }
    input[type=range] { -webkit-appearance:none; flex:1; height:4px; border-radius:2px; background:var(--border); outline:none; cursor:pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:var(--amber); cursor:pointer; box-shadow:0 0 6px rgba(232,160,48,.5); }
    .volume-val  { font-family:'DM Mono',monospace; font-size:11px; color:var(--text-dim); width:30px; text-align:right; }
    .controls    { display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:28px; }
    .ctrl-btn    { background:var(--card); border:1.5px solid var(--border); border-radius:50%; color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; flex-shrink:0; }
    .ctrl-btn:active { transform:scale(.92); }
    .ctrl-btn.sm { width:52px; height:52px; font-size:20px; }
    .ctrl-btn.lg { width:72px; height:72px; font-size:30px; border-color:var(--amber); }
    .ctrl-btn.lg:active { background:rgba(232,160,48,.15); }
    .ctrl-btn.on { color:var(--amber); border-color:var(--amber-dim); background:rgba(232,160,48,.08); }
    .mode-row    { display:flex; justify-content:center; gap:12px; margin-bottom:32px; }
    .mode-btn    { padding:8px 20px; border-radius:20px; border:1.5px solid var(--border); background:transparent; color:var(--text-dim); font-family:'Noto Serif KR',serif; font-size:13px; cursor:pointer; transition:all .2s; }
    .mode-btn.on { border-color:var(--amber-dim); color:var(--amber); background:rgba(232,160,48,.08); }
    .playlist-head { font-size:13px; color:var(--text-dim); font-family:'DM Mono',monospace; margin-bottom:12px; letter-spacing:.08em; }
    .playlist    { display:flex; flex-direction:column; gap:6px; }
    .pl-item     { display:flex; align-items:center; gap:14px; padding:14px 16px; border-radius:10px; background:var(--card); border:1px solid var(--border); cursor:pointer; transition:all .15s; }
    .pl-item:active { background:#282828; }
    .pl-item.active { border-color:var(--amber-dim); background:rgba(232,160,48,.06); }
    .pl-num      { font-family:'DM Mono',monospace; font-size:12px; color:var(--text-dim); width:20px; text-align:center; flex-shrink:0; }
    .pl-item.active .pl-num   { color:var(--amber); }
    .pl-text     { flex:1; }
    .pl-title    { font-size:14px; color:var(--text); }
    .pl-item.active .pl-title { color:var(--amber); }
    .pl-cat      { font-family:'DM Mono',monospace; font-size:11px; color:var(--text-dim); margin-top:2px; }
    .pl-playing  { font-size:18px; animation:spin 2s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(80px); background:#2a1210; border:1px solid var(--red); color:#e57373; font-size:13px; padding:12px 20px; border-radius:10px; font-family:'DM Mono',monospace; transition:transform .3s; z-index:999; white-space:nowrap; }
    .toast.show { transform:translateX(-50%) translateY(0); }
    hr { border:none; border-top:1px solid var(--border); margin:28px 0; }
  </style>
</head>
<body>

<header>
  <div>
    <span class="signal-dot off" id="sigDot"></span>
    <h1>📻 누에마의 문학 라디오</h1>
  </div>
  <p id="nowDate">— 마음을 싣고 달립니다 —</p>
</header>

<div class="wrap">
  <div class="tabs" id="tabs"></div>
  <div class="art-wrap">
    <div class="art-bg"><div class="art-icon" id="artIcon">🎧</div></div>
    <div class="art-gradient"></div>
    <div id="yt-player"></div>
    <div class="status-badge" id="statusBadge">대기 중</div>
    <div class="track-counter" id="trackCounter">—</div>
    <div class="visualizer paused" id="visualizer"></div>
  </div>
  <div class="track-info">
    <div class="track-title" id="trackTitle">트랙을 선택하세요</div>
    <div class="track-meta"  id="trackMeta">—</div>
  </div>
  <div class="volume-row">
    <span class="volume-icon">🔈</span>
    <input type="range" id="volSlider" min="0" max="100" value="80" />
    <span class="volume-icon">🔊</span>
    <span class="volume-val" id="volVal">80</span>
  </div>
  <div class="controls">
    <button class="ctrl-btn sm" onclick="prevTrack()">⏮</button>
    <button class="ctrl-btn lg" id="btnPlay" onclick="togglePlay()">▶</button>
    <button class="ctrl-btn sm" onclick="nextTrack()">⏭</button>
  </div>
  <div class="mode-row">
    <button class="mode-btn" id="btnShuffle" onclick="toggleShuffle()">🔀 셔플</button>
    <button class="mode-btn" id="btnRepeat"  onclick="toggleRepeat()">🔁 반복</button>
  </div>
  <hr/>
  <div class="playlist-head">PLAYLIST</div>
  <div class="playlist" id="playlist"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ★ 트랙 추가/수정은 여기서만 ★
const CATEGORIES = {
  '로파이': {
    icon: '🎧',
    tracks: [
      { title: 'Lofi Hip Hop Radio',  meta: 'Lofi Girl · beats to relax/study', videoId: '5qap5aO4i9A' },
      { title: 'Chillhop Radio',      meta: 'Chillhop Music · jazzy beats',     videoId: '7NOSDKb0HlU' },
      { title: 'Lofi Chill Beats',    meta: 'College Music · focus mode',       videoId: 'b4nRb-7bBbM' },
    ]
  },
  '피아노': {
    icon: '🎹',
    tracks: [
      { title: 'Relaxing Piano Music', meta: 'Soothing Relaxation · 3hrs',  videoId: '1ZYbU82uUpo' },
      { title: 'Sleep Piano Music',    meta: 'Yellow Brick Cinema · calm',   videoId: 'UfcAVejslrU' },
      { title: 'Study Piano Playlist', meta: 'Quiet Quest · deep focus',     videoId: 'lTRiuFIWV54' },
    ]
  },
  '자연': {
    icon: '🌿',
    tracks: [
      { title: 'Rain & Coffee Shop',  meta: 'ambience · white noise',  videoId: 'q76bMs-NwRk' },
      { title: 'Forest Rain ASMR',   meta: 'nature sounds · 8hrs',    videoId: 'xNN7iTA57jM' },
      { title: 'Ocean Waves',         meta: 'relaxing sea sounds',     videoId: 'bn9F19Hi1Lk' },
    ]
  },
};

let player=null,playerReady=false,isPlaying=false,shuffle=false,repeat=false;
let currentCat=Object.keys(CATEGORIES)[0],currentIdx=0,shuffleOrder=[];

try {
  const s=JSON.parse(localStorage.getItem('nuema_radio')||'{}');
  if(s.cat&&CATEGORIES[s.cat])currentCat=s.cat;
  if(typeof s.idx==='number')currentIdx=s.idx;
  if(typeof s.vol==='number')document.getElementById('volSlider').value=s.vol;
  if(s.shuffle)shuffle=true;
  if(s.repeat)repeat=true;
}catch(e){}

function saveState(){try{localStorage.setItem('nuema_radio',JSON.stringify({cat:currentCat,idx:currentIdx,vol:+document.getElementById('volSlider').value,shuffle,repeat}));}catch(e){}}
function tracks(){return CATEGORIES[currentCat].tracks;}
function track(){return tracks()[currentIdx];}

(function(){const s=document.createElement('script');s.src='https://www.youtube.com/iframe_api';document.head.appendChild(s);})();

function onYouTubeIframeAPIReady(){
  player=new YT.Player('yt-player',{
    height:'1',width:'1',videoId:track().videoId,
    playerVars:{autoplay:0,controls:0,disablekb:1},
    events:{onReady:onPlayerReady,onStateChange:onPlayerStateChange,onError:onPlayerError}
  });
}
function onPlayerReady(){playerReady=true;applyVolume();refreshUI();}
function onPlayerStateChange(e){
  if(e.data===YT.PlayerState.PLAYING){
    isPlaying=true;setVisualizer(true);setStatusBadge('재생 중','playing');
    document.getElementById('sigDot').classList.remove('off');
    document.getElementById('btnPlay').textContent='⏸';
  }else if(e.data===YT.PlayerState.PAUSED||e.data===YT.PlayerState.BUFFERING){
    isPlaying=false;setVisualizer(false);
    setStatusBadge(e.data===YT.PlayerState.BUFFERING?'로딩 중':'일시정지','');
    document.getElementById('btnPlay').textContent='▶';
  }else if(e.data===YT.PlayerState.ENDED){handleEnded();}
}
function onPlayerError(){showToast('⚠ 재생 오류 — 다음 트랙으로 넘어갑니다');setStatusBadge('오류','error');setTimeout(()=>nextTrack(),1500);}

function guardPlayer(){if(!player||!playerReady){showToast('플레이어 초기화 중입니다');return false;}return true;}
function togglePlay(){if(!guardPlayer())return;isPlaying?player.pauseVideo():player.playVideo();}
function loadTrack(idx,autoplay){
  if(idx<0)idx=tracks().length-1;
  if(idx>=tracks().length)idx=0;
  currentIdx=idx;saveState();refreshUI();
  if(!guardPlayer())return;
  autoplay!==false?player.loadVideoById(track().videoId):player.cueVideoById(track().videoId);
}
function nextTrack(){
  if(shuffle){const n=shuffleOrder.shift();if(shuffleOrder.length===0)buildShuffle();loadTrack(n??0,true);}
  else loadTrack(currentIdx+1,true);
}
function prevTrack(){
  if(!guardPlayer())return;
  try{if(player.getCurrentTime&&player.getCurrentTime()>3){player.seekTo(0);return;}}catch(e){}
  loadTrack(currentIdx-1,true);
}
function handleEnded(){if(repeat){player.seekTo(0);player.playVideo();return;}nextTrack();}
function buildShuffle(){shuffleOrder=tracks().map((_,i)=>i).filter(i=>i!==currentIdx).sort(()=>Math.random()-.5);}
function toggleShuffle(){shuffle=!shuffle;if(shuffle)buildShuffle();document.getElementById('btnShuffle').classList.toggle('on',shuffle);saveState();}
function toggleRepeat(){repeat=!repeat;document.getElementById('btnRepeat').classList.toggle('on',repeat);saveState();}

function applyVolume(){
  const v=+document.getElementById('volSlider').value;
  document.getElementById('volVal').textContent=v;
  if(player&&playerReady)player.setVolume(v);
  saveState();
}
document.getElementById('volSlider').addEventListener('input',applyVolume);

(function(){
  const viz=document.getElementById('visualizer');
  [18,30,22,36,26,40,28,34,20,32].forEach((h,i)=>{
    const b=document.createElement('div');b.className='vbar';
    b.style.setProperty('--h',h+'px');b.style.setProperty('--dur',(.7+i*.11)+'s');
    b.style.animationDelay=(i*.07)+'s';viz.appendChild(b);
  });
})();

function setVisualizer(on){document.getElementById('visualizer').classList.toggle('paused',!on);}

function buildTabs(){
  const c=document.getElementById('tabs');c.innerHTML='';
  Object.keys(CATEGORIES).forEach(cat=>{
    const b=document.createElement('button');
    b.className='tab'+(cat===currentCat?' active':'');
    b.textContent=CATEGORIES[cat].icon+' '+cat;
    b.onclick=()=>{currentCat=cat;currentIdx=0;buildTabs();buildPlaylist();loadTrack(0,false);};
    c.appendChild(b);
  });
}
function buildPlaylist(){
  const c=document.getElementById('playlist');c.innerHTML='';
  tracks().forEach((t,i)=>{
    const item=document.createElement('div');
    item.className='pl-item'+(i===currentIdx?' active':'');
    item.innerHTML=`<span class="pl-num">${i===currentIdx&&isPlaying?'<span class="pl-playing">⟳</span>':(i+1)}</span><div class="pl-text"><div class="pl-title">${t.title}</div><div class="pl-cat">${t.meta}</div></div>`;
    item.onclick=()=>loadTrack(i,true);
    c.appendChild(item);
  });
}
function setStatusBadge(text,cls){const b=document.getElementById('statusBadge');b.textContent=text;b.className='status-badge'+(cls?' '+cls:'');}
function refreshUI(){
  const t=track();
  document.getElementById('trackTitle').textContent=t.title;
  document.getElementById('trackMeta').textContent=t.meta;
  document.getElementById('trackCounter').textContent=`${currentIdx+1} / ${tracks().length}`;
  document.getElementById('artIcon').textContent=CATEGORIES[currentCat].icon;
  document.getElementById('btnShuffle').classList.toggle('on',shuffle);
  document.getElementById('btnRepeat').classList.toggle('on',repeat);
  buildPlaylist();
}
let toastTimer;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),3000);}

(function(){
  const d=new Date(),days=['일','월','화','수','목','금','토'];
  document.getElementById('nowDate').textContent=`${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]}) · FM 누에마`;
})();

buildTabs();buildPlaylist();refreshUI();
</script>
</body>
</html>
